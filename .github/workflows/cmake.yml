name: CMake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 0xegg-${{ matrix.build_type }}
        path: build/${{ matrix.build_type }}/egg.exe
